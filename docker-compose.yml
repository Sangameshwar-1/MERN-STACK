version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mern_mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  cachex:
    image: cachex:latest
    container_name: mern_cachex
    ports:
      - "6379:6379"
    command: ["./cachex", "--server"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mern_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/felicity
      - JWT_SECRET=felicity_super_secret_jwt_key_2024
      - EMAIL_USER=your_email@gmail.com
      - EMAIL_PASS=your_gmail_app_password
      - ADMIN_EMAIL=admin@felicity.com
      - ADMIN_PASSWORD=Admin@123
      - CLIENT_URL=http://localhost:5173
      - CACHEX_HOST=cachex
    depends_on:
      - mongodb
      - cachex

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mern_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
